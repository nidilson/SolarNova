<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | SolarNova</title>

  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="contacto.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

<header class="header">
  <nav class="nav" aria-label="Navegación principal">
    <span class="logo" tabindex="0">SolarNova</span>

    <ul class="nav-links">
      <li><a href="../index.html" tabindex="0">Inicio</a></li>
      <li><a href="../servicios/servicios.html" tabindex="0">Servicios</a></li>
      <li><a href="../blog/blog.html" tabindex="0">Blog</a></li>
      <li><a href="#" aria-current="page" tabindex="0">Contacto</a></li>
    </ul>
  </nav>
</header>

<main id="contenido">

  <!-- INTRO -->
  <section class="contact-intro">
    <h1 tabindex="0">Contáctanos</h1>
    <p tabindex="0">
      ¿Listo para dar el paso hacia energía limpia? Escríbenos y uno de nuestros
      asesores te contactará.
    </p>
  </section>

  <!-- FORMULARIO -->
  <section class="contact-container">

    <form id="contact-form" novalidate>
      
      <div class="form-group">
        <label for="nombre" tabindex="0">Nombre completo</label>
        <input id="nombre" name="nombre" type="text" required tabindex="0">
        <span class="error" id="error-nombre"></span>
      </div>

      <div class="form-group">
        <label for="email" tabindex="0">Correo electrónico</label>
        <input id="email" name="email" type="email" required tabindex="0">
        <span class="error" id="error-email"></span>
      </div>

      <div class="form-group">
        <label for="mensaje" tabindex="0">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="5" required tabindex="0"></textarea>
        <span class="error" id="error-mensaje"></span>
      </div>

      <div class="form-group checkbox">
        <input id="privacidad" type="checkbox" required tabindex="0">
        <label for="privacidad" tabindex="0">
          Acepto que mis datos sean utilizados únicamente para responder esta solicitud.
        </label>
      </div>

      <button type="submit" class="btn" tabindex="0">Enviar mensaje</button>

      <p id="form-success" class="success" aria-live="polite"></p>

    </form>

  </section>

</main>

<footer class="footer">
  <p tabindex="0">© 2026 SolarNova Costa Rica</p>
</footer>

<script src="contacto.js"></script>

</body>
</html>
