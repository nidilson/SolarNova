<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | SolarNova</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="contacto.css">
</head>

<body>

<header class="header">
  <nav class="nav" aria-label="Navegación principal">
    <h1 class="logo">SolarNova</h1>

    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="servicios.html">Servicios</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contacto.html" aria-current="page">Contacto</a></li>
    </ul>
  </nav>
</header>

<main id="contenido">

  <!-- INTRO -->
  <section class="contact-intro">
    <h2>Contáctanos</h2>
    <p>
      ¿Listo para dar el paso hacia energía limpia? Escríbenos y uno de nuestros
      asesores te contactará.
    </p>
  </section>

  <!-- FORMULARIO -->
  <section class="contact-container">

    <form id="contact-form" novalidate>
      
      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input id="nombre" name="nombre" type="text" required>
        <span class="error" id="error-nombre"></span>
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" name="email" type="email" required>
        <span class="error" id="error-email"></span>
      </div>

      <div class="form-group">
        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
        <span class="error" id="error-mensaje"></span>
      </div>

      <div class="form-group checkbox">
        <input id="privacidad" type="checkbox" required>
        <label for="privacidad">
          Acepto que mis datos sean utilizados únicamente para responder esta solicitud.
        </label>
      </div>

      <button type="submit" class="btn">Enviar mensaje</button>

      <p id="form-success" class="success" aria-live="polite"></p>

    </form>

  </section>

</main>

<footer class="footer">
  <p>© 2026 SolarNova Costa Rica</p>
</footer>

<script>
const form = document.getElementById("contact-form");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  let valid = true;

  const nombre = document.getElementById("nombre");
  const email = document.getElementById("email");
  const mensaje = document.getElementById("mensaje");
  const privacidad = document.getElementById("privacidad");

  const errorNombre = document.getElementById("error-nombre");
  const errorEmail = document.getElementById("error-email");
  const errorMensaje = document.getElementById("error-mensaje");
  const success = document.getElementById("form-success");

  errorNombre.textContent = "";
  errorEmail.textContent = "";
  errorMensaje.textContent = "";
  success.textContent = "";

  if (nombre.value.trim() === "") {
    errorNombre.textContent = "El nombre es obligatorio";
    valid = false;
  }

  if (!email.value.includes("@")) {
    errorEmail.textContent = "Correo inválido";
    valid = false;
  }

  if (mensaje.value.trim() === "") {
    errorMensaje.textContent = "El mensaje es obligatorio";
    valid = false;
  }

  if (!privacidad.checked) {
    alert("Debes aceptar la política de privacidad");
    valid = false;
  }

  if (valid) {
    success.textContent = "Mensaje enviado correctamente (simulado)";
    form.reset();
  }
});
</script>

</body>
</html>
